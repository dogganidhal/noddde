name: Bug Report
description: Report a bug or unexpected behavior in noddde
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Define an aggregate with ...
        2. Dispatch command ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or stack traces if applicable.
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - "@noddde/core"
        - "@noddde/engine"
        - "@noddde/testing"
        - "@noddde/adapters (Drizzle/Prisma/TypeORM)"
        - Multiple packages
        - Other / Not sure
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: The version of the affected package.
      placeholder: e.g., 0.5.2
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, ORM adapter, and any other relevant details.
      placeholder: "Node 22.x, macOS, Drizzle + PostgreSQL"
    validations:
      required: false
